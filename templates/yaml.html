<!DOCTYPE html>
<html>
<head>
    <title>YAML Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h2>Deployment YAML Generator</h2>

    <form method="POST">
        <div class="mb-3">
            <label>Deployment Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Docker Image</label>
            <input type="text" name="image" class="form-control" placeholder="nginx:latest" required>
        </div>

        <div class="mb-3">
            <label>Replicas</label>
            <input type="number" name="replicas" class="form-control" value="1" required>
        </div>

        <button type="submit" class="btn btn-primary">Generate YAML</button>
    </form>

    {% if yaml_output %}
        <div class="alert alert-success mt-4">
            <strong>Generated YAML:</strong>
            <pre>{{ yaml_output }}</pre>
        </div>
    {% endif %}

    <a href="/" class="btn btn-secondary mt-3">Back</a>

</body>
</html>
